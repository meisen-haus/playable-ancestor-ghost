# Build ancestor_ghost.omwaddon and publish one installable mod zip per release.
name: Release build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the zip filename (e.g. v0.1.1). Ignored when triggered by a published release.'
        required: true
        default: 'manual'

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          check-latest: true

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin
        run: node tools/build_esp.mjs

      - name: Verify plugin output
        run: test -f ancestor_ghost.omwaddon

      - name: Package mod zip
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          MOD_DIR="ancestor-ghost"
          STAGING="dist/${MOD_DIR}"
          ZIP="dist/ancestor-ghost-${VERSION}.zip"
          mkdir -p "$STAGING"
          cp ancestor_ghost.omwscripts ancestor_ghost.omwaddon README.md PLAYERS.md CHANGELOG.md LICENSE "$STAGING/"
          cp -r scripts l10n Meshes Textures "$STAGING/"
          echo "=== Mod folder contents ==="
          find "$STAGING" -maxdepth 2 -type f | sort
          test -f "$STAGING/ancestor_ghost.omwscripts"
          test -f "$STAGING/ancestor_ghost.omwaddon"
          mkdir -p dist
          (cd dist && zip -rq "ancestor-ghost-${VERSION}.zip" "$MOD_DIR")
          unzip -l "$ZIP" | head -40
          test -f "$ZIP"

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ancestor-ghost-${{ steps.version.outputs.tag }}.zip

      - name: Upload workflow artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ancestor-ghost-${{ steps.version.outputs.tag }}
          path: dist/ancestor-ghost-${{ steps.version.outputs.tag }}.zip
